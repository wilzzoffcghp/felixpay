<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Chat Support - FelixPedia</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body{overflow:hidden}
    .chat-page{display:flex;flex-direction:column;height:100vh;height:100dvh;position:fixed;inset:0}
    .chat-top{
      height:64px;background:var(--surface);
      border-bottom:1px solid rgba(37,99,235,.08);
      display:flex;align-items:center;gap:14px;padding:0 16px;
      box-shadow:0 2px 16px rgba(37,99,235,.06);flex-shrink:0;
    }
    .cs-avatar{
      width:42px;height:42px;border-radius:13px;
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      display:flex;align-items:center;justify-content:center;
      color:#fff;font-size:18px;position:relative;flex-shrink:0;
    }
    .cs-avatar::after{
      content:'';width:10px;height:10px;background:#10B981;
      border:2px solid #fff;position:absolute;bottom:-1px;right:-1px;border-radius:50%;
    }
    .cs-name{font-size:15px;font-weight:800;color:var(--text)}
    .cs-status{font-size:11px;color:var(--success);font-weight:700}
    .chat-body{
      flex:1;overflow-y:auto;padding:16px;
      background:linear-gradient(180deg,#EFF6FF 0%,#F8FAFF 100%);
      display:flex;flex-direction:column;gap:12px;
    }
    .msg-sent{align-self:flex-end}
    .msg-received{align-self:flex-start}
    .msg-bubble{
      max-width:78%;padding:12px 16px;border-radius:18px;
      font-size:14px;line-height:1.55;font-weight:500;word-break:break-word;
    }
    .msg-sent .msg-bubble{
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;border-bottom-right-radius:4px;
    }
    .msg-received .msg-bubble{
      background:#fff;color:var(--text);
      border-bottom-left-radius:4px;
      box-shadow:0 2px 12px rgba(37,99,235,.08);
      border:1px solid rgba(37,99,235,.06);
    }
    .msg-sender{font-size:10px;font-weight:700;opacity:.7;margin-bottom:3px}
    .msg-time{font-size:10px;margin-top:4px;font-weight:500;text-align:right;opacity:.6}
    .chat-footer{
      background:var(--surface);border-top:1px solid rgba(37,99,235,.08);
      padding:10px 14px calc(10px + env(safe-area-inset-bottom,0));
      display:flex;gap:10px;align-items:flex-end;flex-shrink:0;
    }
    .chat-textarea{
      flex:1;background:var(--surface2);border:1.5px solid var(--border);
      border-radius:20px;padding:11px 16px;
      font-size:14px;font-family:inherit;font-weight:500;
      outline:none;resize:none;max-height:120px;overflow-y:auto;
      transition:var(--transition);line-height:1.4;
    }
    .chat-textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow-sm)}
    .chat-send{
      width:44px;height:44px;border-radius:14px;
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:#fff;font-size:17px;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;box-shadow:0 4px 14px rgba(37,99,235,.35);
      transition:var(--transition);cursor:pointer;border:none;
    }
    .chat-send:active{transform:scale(.9)}
  </style>
</head>
<body>
<div class="chat-page">
  <!-- Chat Header -->
  <div class="chat-top">
    <a href="/dashboard" class="header-btn" style="flex-shrink:0"><i class="fa-solid fa-arrow-left"></i></a>
    <div class="cs-avatar"><i class="fa-solid fa-headset"></i></div>
    <div style="flex:1;min-width:0">
      <div class="cs-name">Customer Support</div>
      <div class="cs-status"><i class="fa-solid fa-circle" style="font-size:8px"></i> Online · Siap Membantu</div>
    </div>
  </div>

  <!-- Chat Body -->
  <div class="chat-body" id="chatMessages">
    <div style="text-align:center;padding:20px">
      <div style="display:inline-block;background:rgba(37,99,235,.08);color:var(--primary);padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700">Percakapan Dimulai</div>
    </div>
  </div>

  <!-- Chat Footer -->
  <div class="chat-footer">
    <textarea class="chat-textarea" id="chatInput" placeholder="Ketik pesan..." rows="1"></textarea>
    <button class="chat-send" id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
  </div>
</div>

<script>
let currentUser = null;
async function initUser() {
  const s = localStorage.getItem('user'); if(!s){window.location.href='/';return;}
  currentUser = JSON.parse(s); if(!currentUser?.id){window.location.href='/';return;}
  loadChat();
  setInterval(loadChat, 5000);
}

function timeStr(ts){ return new Date(ts).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); }

async function loadChat() {
  try {
    const res = await axios.get(`/api/chat/conversation/${currentUser.id}`);
    const msgs = res.data || [];
    const container = document.getElementById('chatMessages');
    const wasAtBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 60;
    container.innerHTML = '<div style="text-align:center;padding:20px"><div style="display:inline-block;background:rgba(37,99,235,.08);color:var(--primary);padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700">Percakapan Dimulai</div></div>';
    msgs.forEach(m => {
      const isSent = !m.from_owner;
      const div = document.createElement('div');
      div.className = isSent ? 'msg-sent' : 'msg-received';
      div.innerHTML = `<div class="msg-bubble">
        <div class="msg-sender">${isSent?'Anda':'Support Agent'}</div>
        ${m.message}
        <div class="msg-time">${timeStr(m.created_at||Date.now())}</div>
      </div>`;
      container.appendChild(div);
    });
    if (wasAtBottom || msgs.length===0) container.scrollTop = container.scrollHeight;
  } catch(e){}
}

document.getElementById('sendBtn').onclick = async () => {
  const inp = document.getElementById('chatInput');
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = ''; inp.style.height='auto';
  try {
    await axios.post('/api/chat/send',{user_id:currentUser.id,username:currentUser.username,message:msg});
    loadChat();
  } catch(e){ alert('Gagal mengirim pesan'); }
};

document.getElementById('chatInput').addEventListener('keypress', e => {
  if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); document.getElementById('sendBtn').click(); }
});
document.getElementById('chatInput').addEventListener('input', function(){
  this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,120)+'px';
});

initUser();
</script>
</body>
</html>
